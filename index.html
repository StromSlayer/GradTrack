            { id: '5_2', semester: '1/2569', code: 'DIG301', name: 'การออกแบบนวัตกรรมดิจิทัลเชิงสร้างสรรค์ 1', credits: 4, grade: ' ', category: 'major_req' },
            { id: '5_3', semester: '1/2569', code: 'DES302', name: 'สัมมนาการออกแบบและเทคโนโลยี', credits: 3, grade: ' ', category: 'core' },
            { id: '5_4', semester: '1/2569', code: 'LAW301', name: 'กฎหมายทรัพย์สินทางปัญญาเพื่องานออกแบบ', credits: 3, grade: ' ', category: 'free' },
            { id: '5_5', semester: '1/2569', code: 'GEN107', name: 'หลักปรัชญาของเศรษฐกิจพอเพียง', credits: 3, grade: ' ', category: 'gen_social' },

        const GRADE_VALUES = {
            'A': 4.0, 'B+': 3.5, 'B': 3.0, 'C+': 2.5, 'C': 2.0, 'D+': 1.5, 'D': 1.0, 'F': 0.0,
            'S': null, 'W': null, 'I': null, ' ': null
        };

        const THEMES = {

            },
            obsidianDark: {

                bg: 'bg-[#e5e9f0]',
                text: 'text-slate-800',
                textMuted: 'text-slate-500',
                inset: 'cream-inset',
                outset: 'cream-outset',
                btnActive: 'cream-inset text-indigo-600 font-extrabold',

            },
            jadeForest: {

                bg: 'bg-[#eaf0ec]',
                text: 'text-emerald-900',
                textMuted: 'text-emerald-700/60',
                inset: 'jade-inset',
                outset: 'jade-outset',
                btnActive: 'jade-inset text-emerald-600 font-extrabold',
                primaryColor: '#059669',
                accent: 'text-emerald-600'
            }
        };

        const CATEGORIES = {
            all: 'ทุกกลุ่มวิชา',
            gen_thai: '1.1 กลุ่มวิชาภาษาไทย',
            gen_inter: '1.2 กลุ่มวิชาภาษาต่างประเทศ',
            gen_sci: '1.3 กลุ่มวิชาวิทยาศาสตร์',
            gen_math: '1.4 กลุ่มวิชาคณิตศาสตร์',
            gen_social: '1.5 กลุ่มวิชาสังคมศาสตร์',
            gen_human: '1.6 กลุ่มวิชามนุษยศาสตร์',
            core: '2. กลุ่มวิชาแกน',
            major_req: '3.1 กลุ่มวิชาชีพบังคับ',
            major_elec: '3.2 กลุ่มวิชาชีพเลือก',
            free: '4. หมวดเลือกเสรี'
        };

        const ALL_SEMESTERS = ['1/2567', '2/2567', '1/2568', '2/2568', '1/2569'];

        function App() {
            const [subjects, setSubjects] = useState(INITIAL_SUBJECTS);
            const [activeTab, setActiveTab] = useState('dashboard'); 
            const [selectedSemester, setSelectedSemester] = useState('1/2569');
            const [currentTheme, setCurrentTheme] = useState('luxuryNavy');
            const [showResetModal, setShowResetModal] = useState(false);

            // ฟอร์มสำหรับเพิ่มวิชาใหม่
            const [formSubject, setFormSubject] = useState({
                semester: '1/2569',
                code: '',
                name: '',
                credits: 3,
                grade: ' ',
                category: 'core'
            });

            const activeStyle = THEMES[currentTheme];

            // ฟังก์ชันคำนวณเกรดสะสม (GPAX) และหน่วยกิต แบบละเอียดตามเงื่อนไขของทางสถาบัน
            const calculatedData = useMemo(() => {
                let cumulativeGP = 0;      
                let cumulativeCA = 0;      
                let cumulativeCE = 0;      
                let cumulativeGPACredits = 0; 

                const semesterBreakdown = {};

                ALL_SEMESTERS.forEach(sem => {
                    const semSubjects = subjects.filter(sub => sub.semester === sem);
                    
                    let semCA = 0; 
                    let semCE = 0; 
                    let semGPACredits = 0; 
                    let semGP = 0; 
                    let hasF = false;

                    semSubjects.forEach(sub => {
                        const val = GRADE_VALUES[sub.grade];
                        const credits = Number(sub.credits);

                        if (sub.grade === 'F') {
                            hasF = true;
                        }

                        if (sub.grade !== ' ') {
                            semCA += credits;

                            if (sub.grade !== 'F' && sub.grade !== 'W' && sub.grade !== 'I') {
                                semCE += credits;
                            }

                            if (val !== null && sub.grade !== 'W' && sub.grade !== 'I' && sub.grade !== 'S') {
                                semGPACredits += credits;
                                semGP += (val * credits);
                            }
                        }
                    });

                    // คำนวณแบบปัดทศนิยมลงเหลือสองตำแหน่ง เพื่อความตรงกับ Transcript
                    const semGPA = semGPACredits > 0 ? Math.floor((semGP / semGPACredits) * 100) / 100 : 0;

                    cumulativeCA += semCA;
                    cumulativeCE += semCE;
                    cumulativeGPACredits += semGPACredits;
                    cumulativeGP += semGP;

                    const currentGPAX = cumulativeGPACredits > 0 ? Math.floor((cumulativeGP / cumulativeGPACredits) * 100) / 100 : 0;

                    let statusLabel = 'ปกติ';
                    let statusColor = 'text-emerald-400';
                    if (currentGPAX > 0 && currentGPAX < 1.75) {
                        statusLabel = 'วิทยทัณฑ์ < 1.75 ⚠️';
                        statusColor = 'text-rose-400 font-extrabold animate-pulse';
                    } else if (currentGPAX >= 1.75 && currentGPAX < 2.00) {
                        statusLabel = 'วิทยทัณฑ์ < 2.00 ⚠️';
                        statusColor = 'text-amber-400 font-bold';
                    }

                    semesterBreakdown[sem] = {
                        subjects: semSubjects,
                        ca: semCA,
                        ce: semCE,
                        gp: semGP,
                        gpa: semGPA.toFixed(2),
                        cumCA: cumulativeCA,
                        cumCE: cumulativeCE,
                        cumCC: cumulativeGPACredits,
                        cumGP: cumulativeGP,
                        gpax: currentGPAX.toFixed(2),
                        statusLabel,
                        statusColor,
                        hasF
                    };
                });

                const latestSem = ALL_SEMESTERS[ALL_SEMESTERS.length - 1];
                const overallGPAX = parseFloat(semesterBreakdown[latestSem]?.gpax || '0.00');
                const overallCE = semesterBreakdown[latestSem]?.cumCE || 0;

                // ตรวจสอบเกียรตินิยม
                let honorsResult = 'ไม่เข้าเกณฑ์เกียรตินิยม';
                let honorsSubText = 'เกรดเฉลี่ยสะสมไม่ถึงเกณฑ์ขั้นต่ำ 3.25';
                const hasFHistory = subjects.some(s => s.grade === 'F');

                if (hasFHistory) {
                    honorsSubText = 'มีประวัติติดเกรด F ตลอดการศึกษา (หมดสิทธิ์เกียรตินิยม)';
                } else if (overallGPAX >= 3.75) {
                    honorsResult = overallCE >= 133 ? 'เกียรตินิยมอันดับ 1 🏆' : 'ว่าที่เกียรตินิยมอันดับ 1';
                    honorsSubText = overallCE >= 133 ? 'คุณสมบัติครบถ้วนตามหลักสูตร!' : `ต้องการอีก ${133 - overallCE} หน่วยกิตเพื่อเรียนจบตามแผน`;
                } else if (overallGPAX >= 3.25) {
                    honorsResult = overallCE >= 133 ? 'เกียรตินิยมอันดับ 2 🥈' : 'ว่าที่เกียรตินิยมอันดับ 2';
                    honorsSubText = overallCE >= 133 ? 'คุณสมบัติครบถ้วนตามแผนการเรียน!' : `ต้องการอีก ${133 - overallCE} หน่วยกิตเพื่อเรียนจบตามแผน`;
                }

                // นับความก้าวหน้าหน่วยกิตรายกลุ่มวิชา
                const categoryProgress = {};
                Object.keys(CATEGORIES).forEach(c => categoryProgress[c] = 0);
                subjects.forEach(sub => {
                    if (sub.grade !== ' ' && sub.grade !== 'F' && sub.grade !== 'W' && sub.grade !== 'I') {
                        categoryProgress[sub.category] = (categoryProgress[sub.category] || 0) + Number(sub.credits);
                    }
                });

                return {
                    semesterBreakdown,
                    overallGPAX,
                    overallCE,
                    honorsResult,
                    honorsSubText,
                    categoryProgress
                };
            }, [subjects]);

            // หาเกรดเป้าหมายขั้นต่ำของเทอมปัจจุบันเพื่อหลุดวิทยทัณฑ์
            const simulationInsight = useMemo(() => {
                const uncalculatedSub = subjects.filter(s => s.semester === '1/2569' && s.grade === ' ');
                const calculatedSub = subjects.filter(s => !(s.semester === '1/2569' && s.grade === ' '));
                
                let prevGP = 0;
                let prevCredits = 0;
                calculatedSub.forEach(s => {
                    const v = GRADE_VALUES[s.grade];
                    if (v !== null && s.grade !== 'S' && s.grade !== 'W') {
                        prevGP += (v * Number(s.credits));
                        prevCredits += Number(s.credits);
                    }
                });

                const termCredits = uncalculatedSub.reduce((sum, item) => sum + Number(item.credits), 0);
                const targetPointsNeeded = (2.00 * (prevCredits + termCredits)) - prevGP;
                const requiredGPA = termCredits > 0 ? (targetPointsNeeded / termCredits) : 0;

                return {
                    termCredits,
                    requiredGPA: requiredGPA > 0 ? requiredGPA.toFixed(2) : '0.00',
                    isImpossible: requiredGPA > 4.0,
                    isSafe: (prevGP / prevCredits) >= 2.00
                };
            }, [subjects]);

            const changeSubjectGrade = (id, newGrade) => {
                setSubjects(prev => prev.map(s => s.id === id ? { ...s, grade: newGrade } : s));
            };

            const addCustomSubject = (e) => {
                e.preventDefault();
                if (!formSubject.code || !formSubject.name) return;
                const newId = 'custom_' + Date.now();
                setSubjects(prev => [...prev, { ...formSubject, id: newId }]);
                setFormSubject({
                    semester: selectedSemester,
                    code: '',
                    name: '',
                    credits: 3,
                    grade: ' ',
                    category: 'core'
                });
            };

            const deleteSubject = (id) => {
                setSubjects(prev => prev.filter(s => s.id !== id));
            };
